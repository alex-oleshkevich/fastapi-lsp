name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test

      - name: Build
        run: cargo build

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: E2E tests
        if: hashFiles('e2e/**/*.py') != ''
        run: uv run pytest e2e/ -v

  check-self:
    # dogfood: run our own linter over the e2e fixtures once `check` exists
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check fixtures parse
        run: |
          if [ -d e2e/fixtures ]; then
            cargo run -- check e2e/fixtures/bookshop --format json || true
          fi
