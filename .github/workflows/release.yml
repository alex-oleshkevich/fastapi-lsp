name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          cd "target/$TARGET/release"
          tar czf "fastapi-lsp-$REF_NAME-$TARGET.tar.gz" fastapi-lsp
          mv ./*.tar.gz "$GITHUB_WORKSPACE/"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          cd "target/$env:TARGET/release"
          Compress-Archive -Path fastapi-lsp.exe -DestinationPath "fastapi-lsp-$env:REF_NAME-$env:TARGET.zip"
          Move-Item -Path "*.zip" -Destination "$env:GITHUB_WORKSPACE/"

      - uses: actions/upload-artifact@v4
        with:
          name: fastapi-lsp-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip
          sccache: true
          manylinux: 2_28
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: target/wheels/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          generate_release_notes: true

  publish-aur:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          GH_REPO: ${{ github.repository }}
          GH_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${GH_TAG#v}"

          CHECKSUM_X86=$(curl -sL \
            "https://github.com/${GH_REPO}/releases/download/${GH_TAG}/fastapi-lsp-${GH_TAG}-x86_64-unknown-linux-gnu.tar.gz" \
            | sha256sum | cut -d' ' -f1)
          CHECKSUM_ARM=$(curl -sL \
            "https://github.com/${GH_REPO}/releases/download/${GH_TAG}/fastapi-lsp-${GH_TAG}-aarch64-unknown-linux-gnu.tar.gz" \
            | sha256sum | cut -d' ' -f1)

          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur_rsa
          chmod 600 ~/.ssh/aur_rsa
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts

          if git clone -c core.sshCommand="ssh -i ~/.ssh/aur_rsa" \
              ssh://aur@aur.archlinux.org/fastapi-lsp.git /tmp/aur; then
            echo "Updating existing AUR package"
          else
            echo "Initialising new AUR package"
            mkdir /tmp/aur
            git -C /tmp/aur init
            git -C /tmp/aur remote add origin ssh://aur@aur.archlinux.org/fastapi-lsp.git
          fi

          sed \
            -e "s/^pkgver=.*/pkgver=${VERSION}/" \
            -e "s/^pkgrel=.*/pkgrel=1/" \
            -e "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${CHECKSUM_X86}')/" \
            -e "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${CHECKSUM_ARM}')/" \
            pkg/aur/PKGBUILD > /tmp/aur/PKGBUILD

          docker run --rm -v /tmp/aur:/pkg archlinux:base-devel \
            bash -c "useradd -m builder && cd /pkg && su builder -c 'makepkg --printsrcinfo' > .SRCINFO"

          cd /tmp/aur
          git config user.email "ci@fastapi-lsp.dev"
          git config user.name "fastapi-lsp CI"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "bump to ${VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_rsa" git push origin HEAD:master

  publish-pypi:
    needs: [release, build-wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - name: List dist
        run: find dist -type f | sort
      - uses: astral-sh/setup-uv@v4
      - run: uv publish dist/*.whl
